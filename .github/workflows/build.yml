name: Build ml0987 Downloader

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        cd crawler
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Download FFmpeg
      run: |
        cd crawler
        Write-Host "Downloading FFmpeg..."
        Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
        Write-Host "Extracting FFmpeg..."
        Expand-Archive -Path "ffmpeg.zip" -DestinationPath "."
        Write-Host "Moving FFmpeg to crawler directory..."
        Move-Item -Path "ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe" -Destination "ffmpeg.exe"
        Move-Item -Path "ffmpeg-master-latest-win64-gpl/bin/ffprobe.exe" -Destination "ffprobe.exe"
        Write-Host "Cleaning up..."
        Remove-Item -Path "ffmpeg-master-latest-win64-gpl" -Recurse -Force
        Remove-Item -Path "ffmpeg.zip" -Force

    - name: Build with PyInstaller
      run: |
        cd crawler
        pyinstaller --noconfirm --onefile --windowed `
          --name "ml0987下载器" `
          --add-data "crawler_core.py;." `
          --add-data "ffmpeg.exe;." `
          --add-data "ffprobe.exe;." `
          --hidden-import selenium `
          --hidden-import webdriver_manager `
          --hidden-import bs4 `
          --hidden-import lxml `
          --hidden-import requests `
          --hidden-import PySocks `
          --hidden-import pycryptodome `
          --hidden-import Crypto `
          --hidden-import Crypto.Cipher `
          --hidden-import Crypto.Util `
          --hidden-import tkinter `
          --hidden-import tkinter.ttk `
          --hidden-import tkinter.scrolledtext `
          --hidden-import tkinter.filedialog `
          --hidden-import tkinter.messagebox `
          app.py

    - name: Verify build output
      run: |
        cd crawler/dist
        if (Test-Path "ml0987下载器.exe") {
          Write-Host "✓ ml0987下载器.exe created successfully"
          $size = (Get-Item "ml0987下载器.exe").Length / 1MB
          Write-Host "File size: $([math]::Round($size, 2)) MB"
        } else {
          Write-Host "✗ ml0987下载器.exe NOT found!"
          exit 1
        }

    - name: Create release package
      run: |
        cd crawler/dist
        Compress-Archive -Path "ml0987下载器.exe" -DestinationPath "ml0987下载器-windows.zip"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ml0987下载器-windows
        path: crawler/dist/ml0987下载器-windows.zip
        retention-days: 30

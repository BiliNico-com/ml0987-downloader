# .github/workflows/build.yml
name: 自动编译 ml0987 视频下载器

on:
  push:
    branches: [ main ]
    paths:
      - 'app.py'
      - 'crawler_core.py'
      - 'requirements.txt'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd  # 全局用CMD，彻底避免PowerShell语法冲突

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller>=6.0.0

      - name: 打包为单个 EXE
        run: pyinstaller --onefile --windowed --name "ml0987下载器" app.py

      # 提前创建产物目录（必须）
      - name: 创建打包目录
        run: if not exist "dist\package" mkdir dist\package

      # 核心修复：将PowerShell命令写成单行，避免换行符解析错误
      - name: 下载并复制FFmpeg（单行PowerShell命令）
        run: |
          mkdir ffmpeg_temp 2>nul
          curl -L -o ffmpeg_temp\ffmpeg.zip https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip
          # 单行PowerShell命令（无换行符，避免语法错误）
          powershell -Command "Expand-Archive -Path 'ffmpeg_temp\ffmpeg.zip' -DestinationPath 'ffmpeg_temp' -Force; $ffmpeg_exe = Get-ChildItem -Path 'ffmpeg_temp' -Filter 'ffmpeg.exe' -Recurse | Select-Object -First 1; if ($ffmpeg_exe) { Copy-Item -Path $ffmpeg_exe.FullName -Destination 'dist\package\ffmpeg.exe' -Force; Write-Host '✅ ffmpeg.exe复制成功' } else { Write-Error '❌ 未找到ffmpeg.exe'; exit 1 }"

      - name: 整理产物
        run: |
          copy dist\ml0987下载器.exe dist\package\
          copy requirements.txt dist\package\
          if exist README.md copy README.md dist\package\
          # 生成config.json
          echo { > dist\package\config.json
          echo   "output_dir": "downloads", >> dist\package\config.json
          echo   "ffmpeg_path": "", >> dist\package\config.json
          echo   "proxy_enabled": false, >> dist\package\config.json
          echo   "proxy_host": "127.0.0.1", >> dist\package\config.json
          echo   "proxy_port": "1080", >> dist\package\config.json
          echo   "proxy_user": "", >> dist\package\config.json
          echo   "proxy_pass": "", >> dist\package\config.json
          echo   "headless": true, >> dist\package\config.json
          echo   "list_type": "list", >> dist\package\config.json
          echo   "page_start": 1, >> dist\package\config.json
          echo   "page_end": 3 >> dist\package\config.json
          echo } >> dist\package\config.json
          # 生成使用说明
          echo === ml0987视频下载器 使用说明 === > dist\package\使用说明.txt
          echo 1. 解压后直接运行ml0987下载器.exe（已内置FFmpeg） >> dist\package\使用说明.txt
          echo 2. 视频默认保存到同目录downloads文件夹 >> dist\package\使用说明.txt
          echo 3. 代理仅支持SOCKS5，在「设置」标签页配置 >> dist\package\使用说明.txt

      - name: 压缩为ZIP包
        shell: powershell
        run: Compress-Archive -Path "dist\package\*" -DestinationPath "dist\ml0987下载器_${{ github.run_id }}.zip"

      - name: 上传Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_id }}
          name: 自动构建_${{ github.run_id }}
          body: |
            📦 ml0987视频下载器 Windows版
            - 构建时间：${{ github.run_at }}
            - 包含：主程序+FFmpeg+配置文件
            - 解压即运行，无需额外依赖
          files: dist\ml0987下载器_${{ github.run_id }}.zip
          draft: false
          prerelease: false

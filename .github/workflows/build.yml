# .github/workflows/build.yml
name: 编译发布 - 发布到 GitHub Releases

on:
  push:
    tags:
      - 'v*'    # 推送 v1.0.0 等格式的 tag 时触发
  workflow_dispatch:
    inputs:
      tag:
        description: '版本号（如 v1.2.0），留空则使用日期'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    env:
      APP_NAME: ml0987_downloader
      PYTHONIOENCODING: utf-8
      LC_ALL: C.UTF-8
    defaults:
      run:
        shell: cmd

    steps:
      - name: 确定版本号
        id: version
        shell: powershell
        run: |
          if ("${{ github.ref }}".StartsWith("refs/tags/v")) {
            $ver = "${{ github.ref }}".Substring(11)
            echo "TAG=v$ver" >> $env:GITHUB_OUTPUT
            echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          } elseif ("${{ github.event.inputs.tag }}") {
            $tag = "${{ github.event.inputs.tag }}"
            if ($tag -notmatch '^v') { $tag = "v$tag" }
            echo "TAG=$tag" >> $env:GITHUB_OUTPUT
            echo "VERSION=$($tag -replace '^v','')" >> $env:GITHUB_OUTPUT
          } else {
            $date = Get-Date -Format "yyyyMMdd"
            echo "TAG=v$date" >> $env:GITHUB_OUTPUT
            echo "VERSION=$date" >> $env:GITHUB_OUTPUT
          }
          echo "Version: ${{ steps.version.outputs.TAG }}"

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller>=6.0.0

      - name: 打包EXE
        run: |
          pyinstaller --noconfirm --onedir --windowed --contents-directory Core --name "%APP_NAME%" --add-data "crawler_core.py;." --add-data "socks.py;." --hidden-import PIL --hidden-import PIL.ImageTk --hidden-import PIL.WebPImagePlugin --hidden-import Crypto.Cipher --collect-all Pillow --collect-all pycryptodome app.py

      - name: 下载FFmpeg压缩包
        run: |
          if not exist "ffmpeg_temp" mkdir ffmpeg_temp
          curl -L -o ffmpeg_temp\ffmpeg.zip https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip

      - name: 解压并复制FFmpeg
        shell: powershell
        run: |
          Expand-Archive -Path 'ffmpeg_temp\ffmpeg.zip' -DestinationPath 'ffmpeg_temp' -Force
          $ffmpeg_exe = Get-ChildItem -Path 'ffmpeg_temp' -Filter 'ffmpeg.exe' -Recurse | Select-Object -First 1
          if ($ffmpeg_exe) {
              Copy-Item -Path $ffmpeg_exe.FullName -Destination "dist\$env:APP_NAME\ffmpeg.exe" -Force
              Write-Host 'FFmpeg copied successfully'
          } else {
              Write-Error 'FFmpeg.exe not found'
              exit 1
          }

      - name: 复制说明文件到打包目录
        run: |
          copy requirements.txt "dist\%APP_NAME%\"
          copy README.md "dist\%APP_NAME%\"
          echo {"output_dir":"downloads","ffmpeg_path":"","proxy_enabled":false} > "dist\%APP_NAME%\config.json"

      - name: 打包ZIP
        shell: powershell
        run: |
          Write-Host 'Package files:'
          Get-ChildItem -Path "dist\$env:APP_NAME"
          Compress-Archive -Path "dist\$env:APP_NAME\*" -DestinationPath "dist\ml0987_downloader_${{ steps.version.outputs.VERSION }}.zip"

      - name: 创建 Release 并上传
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: ${{ steps.version.outputs.TAG }}
          body: |
            ## hsex 视频下载器 ${{ steps.version.outputs.TAG }}

            ### 下载
            解压后直接运行 `ml0987_downloader.exe`，内置 ffmpeg，无需额外配置。

            ### 功能
            - 批量爬取（视频/周榜/月榜/5分钟+/10分钟+）
            - 关键词搜索下载
            - 搜索作者并批量下载（自动归档到作者目录）
            - 自动检测作者总页数
            - 按视频上传日期分类
            - 防重复下载
            - 多域名 + SOCKS5 代理
            - 封面预览 + 切片进度
          files: |
            dist/ml0987_downloader_${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: false

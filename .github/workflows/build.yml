# .github/workflows/build.yml
name: 编译测试 - 生成临时包

on:
  push:
    branches: [ main ]
    paths:
      - 'app.py'
      - 'crawler_core.py'
      - 'requirements.txt'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-test:
    runs-on: windows-latest
    env:
      TEST_ZIP_NAME: ml0987下载器_测试包.zip
    defaults:
      run:
        shell: cmd

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller>=6.0.0

      - name: 打包EXE
        run: |
          pyinstaller --onefile --windowed --name "ml0987下载器" app.py

      - name: 创建产物目录
        run: |
          if not exist "dist\test_package" mkdir dist\test_package

      - name: 下载并复制FFmpeg
        run: |
          mkdir ffmpeg_temp 2>nul
          curl -L -o ffmpeg_temp\ffmpeg.zip https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip
          # 修复：PowerShell命令用单引号+单行无换行
          powershell -Command Expand-Archive -Path 'ffmpeg_temp\ffmpeg.zip' -DestinationPath 'ffmpeg_temp' -Force; $ffmpeg_exe = Get-ChildItem -Path 'ffmpeg_temp' -Filter 'ffmpeg.exe' -Recurse | Select-Object -First 1; if ($ffmpeg_exe) { Copy-Item -Path $ffmpeg_exe.FullName -Destination 'dist\test_package\ffmpeg.exe' -Force; Write-Host '✅ FFmpeg复制成功' } else { Write-Error '❌ 未找到FFmpeg'; exit 1 }

      - name: 整理测试包文件
        run: |
          copy dist\ml0987下载器.exe dist\test_package\
          copy requirements.txt dist\test_package\
          echo {"output_dir":"downloads","ffmpeg_path":"","proxy_enabled":false} > dist\test_package\config.json
          echo === 测试包使用说明 === > dist\test_package\测试说明.txt
          echo 1. 直接运行ml0987下载器.exe测试 >> dist\test_package\测试说明.txt
          echo 2. 内置FFmpeg，无需额外下载 >> dist\test_package\测试说明.txt

      - name: 压缩测试包（修复引号问题）
        shell: powershell
        # 核心修复：所有路径用单引号，命令无换行，避免解析错误
        run: |
          Write-Host '🔍 测试包目录文件列表：'
          Get-ChildItem -Path 'dist\test_package'
          Compress-Archive -Path 'dist\test_package\*' -DestinationPath 'dist\${{ env.TEST_ZIP_NAME }}'
          Write-Host '🔍 最终生成的文件：'
          Get-ChildItem -Path 'dist'

      - name: 上传临时测试包（Artifacts）
        uses: actions/upload-artifact@v4
        with:
          name: ml0987下载器-临时测试包
          path: dist\${{ env.TEST_ZIP_NAME }}
          retention-days: 7
          if-no-files-found: error

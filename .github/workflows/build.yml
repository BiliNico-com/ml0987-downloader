# .github/workflows/build.yml
name: 自动编译 ml0987 视频下载器

# 触发条件：push 到 main 分支 / 手动触发
on:
  push:
    branches: [ main ]
    paths:
      - 'app.py'
      - 'crawler_core.py'
      - 'requirements.txt'
      - '.github/workflows/build.yml'
  workflow_dispatch:  # 允许手动触发

# 工作流权限
permissions:
  contents: write  # 允许上传 Release 产物

jobs:
  build-windows:
    runs-on: windows-latest  # 使用 Windows 构建环境（适配 ffmpeg.exe/浏览器驱动）
    
    steps:
      # 1. 检出代码
      - name: 检出仓库代码
        uses: actions/checkout@v4
      
      # 2. 设置 Python 环境
      - name: 配置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'  # 选择稳定版本，适配 tkinter/selenium
          cache: 'pip'  # 缓存依赖，加速构建
      
      # 3. 安装依赖
      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller  # 用于打包成 exe
      
      # 4. 打包可执行文件（PyInstaller）
      - name: 打包为单个 EXE
        run: |
          pyinstaller --onefile --windowed --name "ml0987下载器" ^
          --add-data "config.json;." ^  # 包含配置文件（如果需要）
          --icon=none ^  # 无图标，如需自定义可替换为 icon.ico
          app.py
        shell: cmd
      
      # 5. 准备打包产物（源码 + EXE）
      - name: 整理产物
        run: |
          # 创建输出目录
          mkdir -p dist/package
          # 复制 EXE 到打包目录
          copy dist\ml0987下载器.exe dist\package\
          # 复制依赖说明、README 等
          copy requirements.txt dist\package\
          copy README.md dist\package\
          # 提示文档（告知用户需自行下载 ffmpeg.exe）
          echo "使用说明：1. 将 ffmpeg.exe 放入同目录；2. 运行 ml0987下载器.exe" > dist\package\使用说明.txt
      
      # 6. 压缩产物
      - name: 压缩为 ZIP 包
        run: |
          Compress-Archive -Path dist\package\* -DestinationPath dist\ml0987下载器_${{ github.run_id }}.zip
      
      # 7. 上传为 GitHub Release 产物
      - name: 创建 Release 并上传产物
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_id }}  # 用运行 ID 作为版本号
          name: 自动构建_${{ github.run_id }}
          body: |
            📦 自动编译的 ml0987 视频下载器
            - 构建时间：${{ github.run_at }}
            - 注意：需自行下载 ffmpeg.exe 放入同目录运行
          files: |
            dist\ml0987下载器_${{ github.run_id }}.zip
          draft: false
          prerelease: false

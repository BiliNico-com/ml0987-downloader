# .github/workflows/build.yml
name: 编译测试 - 生成临时包

on:
  push:
    branches: [ main ]
    paths:
      - 'app.py'
      - 'crawler_core.py'
      - 'socks.py'
      - 'requirements.txt'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-test:
    runs-on: windows-latest
    env:
      TEST_ZIP_NAME: ml0987_downloader_test.zip
      APP_NAME: ml0987_downloader
      PYTHONIOENCODING: utf-8
      LC_ALL: C.UTF-8
    defaults:
      run:
        shell: cmd

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller>=6.0.0

      - name: 打包EXE
        run: |
          pyinstaller --noconfirm --onedir --windowed --contents-directory Core --name "%APP_NAME%" --add-data "crawler_core.py;." --add-data "socks.py;." --hidden-import PIL --hidden-import PIL.ImageTk --hidden-import PIL.WebPImagePlugin --hidden-import Crypto.Cipher --collect-all Pillow --collect-all pycryptodome app.py

      - name: 创建FFmpeg临时目录
        run: |
          if not exist "ffmpeg_temp" mkdir ffmpeg_temp

      - name: 下载FFmpeg压缩包
        run: |
          curl -L -o ffmpeg_temp\ffmpeg.zip https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip

      - name: 解压并复制FFmpeg
        shell: powershell
        run: |
          Expand-Archive -Path 'ffmpeg_temp\ffmpeg.zip' -DestinationPath 'ffmpeg_temp' -Force
          $ffmpeg_exe = Get-ChildItem -Path 'ffmpeg_temp' -Filter 'ffmpeg.exe' -Recurse | Select-Object -First 1
          if ($ffmpeg_exe) {
              Copy-Item -Path $ffmpeg_exe.FullName -Destination "dist\$env:APP_NAME\ffmpeg.exe" -Force
              Write-Host 'FFmpeg copied successfully'
          } else {
              Write-Error 'FFmpeg.exe not found'
              exit 1
          }

      - name: 复制说明文件到打包目录
        run: |
          copy requirements.txt "dist\%APP_NAME%\"
          copy README.md "dist\%APP_NAME%\"
          echo {"output_dir":"downloads","ffmpeg_path":"","proxy_enabled":false} > "dist\%APP_NAME%\config.json"

      - name: 压缩测试包
        shell: powershell
        run: |
          Write-Host 'Package files:'
          Get-ChildItem -Path "dist\$env:APP_NAME"
          Compress-Archive -Path "dist\$env:APP_NAME\*" -DestinationPath "dist\$env:TEST_ZIP_NAME"
          Write-Host 'Final generated files:'
          Get-ChildItem -Path 'dist'

      - name: 上传临时测试包（Artifacts）
        uses: actions/upload-artifact@v4
        with:
          name: ml0987-downloader-test-package
          path: dist\${{ env.TEST_ZIP_NAME }}
          retention-days: 7
          if-no-files-found: error

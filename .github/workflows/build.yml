# .github/workflows/build.yml
name: 编译测试 - 生成临时包

on:
  push:
    branches: [ main ]
    paths:
      - 'app.py'
      - 'crawler_core.py'
      - 'requirements.txt'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-test:
    runs-on: windows-latest
    env:
      # 关键：改用纯英文文件名，避免中文乱码
      TEST_ZIP_NAME: ml0987_downloader_test.zip
    defaults:
      run:
        shell: cmd

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller>=6.0.0

      - name: 打包EXE
        run: |
          # 主程序仍用中文名称（最终用户能看到），仅打包文件用英文
          pyinstaller --onefile --windowed --name "ml0987下载器" app.py

      - name: 创建测试包目录
        run: |
          if not exist "dist\test_package" mkdir dist\test_package

      - name: 创建FFmpeg临时目录
        run: |
          if not exist "ffmpeg_temp" mkdir ffmpeg_temp

      - name: 下载FFmpeg压缩包
        run: |
          curl -L -o ffmpeg_temp\ffmpeg.zip https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip

      - name: 解压并复制FFmpeg
        shell: powershell
        run: |
          Expand-Archive -Path 'ffmpeg_temp\ffmpeg.zip' -DestinationPath 'ffmpeg_temp' -Force
          $ffmpeg_exe = Get-ChildItem -Path 'ffmpeg_temp' -Filter 'ffmpeg.exe' -Recurse | Select-Object -First 1
          if ($ffmpeg_exe) {
              Copy-Item -Path $ffmpeg_exe.FullName -Destination 'dist\test_package\ffmpeg.exe' -Force
              Write-Host '✅ FFmpeg复制成功'
          } else {
              Write-Error '❌ 未找到ffmpeg.exe'
              exit 1
          }

      - name: 整理测试包文件
        run: |
          copy dist\ml0987下载器.exe dist\test_package\
          copy requirements.txt dist\test_package\
          echo {"output_dir":"downloads","ffmpeg_path":"","proxy_enabled":false} > dist\test_package\config.json
          # 说明文件用英文命名（避免乱码），内容仍保留中文
          echo === 测试包使用说明 === > dist\test_package\readme.txt
          echo 1. 直接运行ml0987下载器.exe测试 >> dist\test_package\readme.txt
          echo 2. 内置FFmpeg，无需额外下载 >> dist\test_package\readme.txt

      - name: 压缩测试包
        shell: powershell
        run: |
          Write-Host '🔍 测试包目录文件列表：'
          Get-ChildItem -Path 'dist\test_package'
          # 使用英文变量名，避免中文编码问题
          Compress-Archive -Path 'dist\test_package\*' -DestinationPath "dist\${{ env.TEST_ZIP_NAME }}"
          Write-Host '🔍 最终生成的文件：'
          Get-ChildItem -Path 'dist'

      - name: 上传临时测试包（Artifacts）
        uses: actions/upload-artifact@v4
        with:
          # Artifacts名称用英文，避免显示乱码
          name: ml0987-downloader-test-package
          # 路径用英文变量，100%匹配生成的文件
          path: dist\${{ env.TEST_ZIP_NAME }}
          retention-days: 7
          if-no-files-found: error

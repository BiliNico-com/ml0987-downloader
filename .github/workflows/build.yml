name: Build ml0987 Downloader

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'crawler/**'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        cd crawler
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Download FFmpeg
      run: |
        curl -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
        7z x ffmpeg.zip -y
        move ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe crawler/
        move ffmpeg-master-latest-win64-gpl/bin/ffprobe.exe crawler/
        rmdir /s /q ffmpeg-master-latest-win64-gpl
        del ffmpeg.zip

    - name: Build with PyInstaller
      working-directory: ./crawler
      run: |
        pyinstaller --onefile --windowed ^
          --name "ml0987下载器" ^
          --add-data "crawler_core.py;." ^
          --add-data "ffmpeg.exe;." ^
          --add-data "ffprobe.exe;." ^
          --hidden-import selenium ^
          --hidden-import webdriver_manager ^
          --hidden-import bs4 ^
          --hidden-import lxml ^
          --hidden-import requests ^
          --hidden-import PySocks ^
          --hidden-import pycryptodome ^
          --hidden-import Crypto ^
          --hidden-import Crypto.Cipher ^
          --hidden-import Crypto.Util ^
          --hidden-import tkinter ^
          --hidden-import ttk ^
          --hidden-import scrolledtext ^
          --hidden-import filedialog ^
          --hidden-import messagebox ^
          app.py

    - name: Verify build output
      working-directory: ./crawler
      run: |
        if exist "dist\ml0987下载器.exe" (
          echo ✓ Build successful
        ) else (
          echo ✗ Build failed
          exit 1
        )

    - name: Create release package
      working-directory: ./crawler/dist
      run: |
        7z a ml0987下载器-windows.zip ml0987下载器.exe

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ml0987下载器-windows
        path: ./crawler/dist/ml0987下载器-windows.zip
        retention-days: 30

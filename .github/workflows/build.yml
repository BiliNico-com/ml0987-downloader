# 找到 _check_environment 方法，替换为以下代码
def _check_environment(self):
    """检查运行环境 - 支持自动识别同目录 ffmpeg.exe"""
    self.env_status_text.delete(1.0, tk.END)

    # 优先检查 EXE 同目录（打包后 EXE 所在目录）
    if getattr(sys, 'frozen', False):
        # 打包后的运行目录
        app_path = Path(sys.executable).parent
    else:
        # 开发环境目录
        app_path = APP_DIR

    # 检查 ffmpeg.exe
    ffmpeg_paths = [
        app_path / "ffmpeg.exe",
        APP_DIR / "ffmpeg.exe",
        Path(self.config.get("ffmpeg_path", ""))
    ]
    ffmpeg_found = False
    ffmpeg_actual_path = ""
    for path in ffmpeg_paths:
        if path.exists() and path.is_file():
            ffmpeg_found = True
            ffmpeg_actual_path = str(path)
            break

    self._append_status(f"✓ ffmpeg:", "OK" if ffmpeg_found else "FAIL")
    if not ffmpeg_found:
        self._append_status(f"  请将 ffmpeg.exe 放置于: {app_path}", "WARN")
    else:
        self._append_status(f"  路径: {ffmpeg_actual_path}", "OK")

    return ffmpeg_found

# 同时修改 check_ffmpeg 方法（如果用户删除了 ffmpeg.exe 时提示）
def check_ffmpeg(self):
    """检查 ffmpeg.exe 是否存在，缺失时询问用户是否下载"""
    if getattr(sys, 'frozen', False):
        app_path = Path(sys.executable).parent
    else:
        app_path = APP_DIR
    
    ffmpeg_path = app_path / "ffmpeg.exe"
    if not ffmpeg_path.exists():
        result = messagebox.askyesno(
            "缺少 ffmpeg.exe",
            f"检测到程序目录下缺少 ffmpeg.exe 文件。\n\n"
            f"程序需要 ffmpeg.exe 才能正常工作。\n\n"
            f"是否跳转到 ffmpeg 官网下载？"
        )
        if result:
            import webbrowser
            webbrowser.open("https://ffmpeg.org/download.html")
    return ffmpeg_path.exists()

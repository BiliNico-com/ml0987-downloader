name: Build Windows Executable

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'crawler/**'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      working-directory: crawler
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Download FFmpeg (static build)
      run: |
        echo "Downloading FFmpeg..."
        curl -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
        echo "Extracting FFmpeg..."
        unzip ffmpeg.zip
        mv ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe crawler/ffmpeg.exe
        mv ffmpeg-master-latest-win64-gpl/bin/ffprobe.exe crawler/ffprobe.exe
        rm -rf ffmpeg-master-latest-win64-gpl ffmpeg.zip

    - name: Build with PyInstaller
      working-directory: crawler
      run: |
        pyinstaller ^
          --noconfirm ^
          --onedir ^
          --windowed ^
          --name "ml0987下载器" ^
          --add-data "crawler_core.py;." ^
          --add-data "ffmpeg.exe;." ^
          --add-data "ffprobe.exe;." ^
          --hidden-import selenium ^
          --hidden-import webdriver_manager ^
          --hidden-import bs4 ^
          --hidden-import lxml ^
          --hidden-import requests ^
          --hidden-import socks ^
          --hidden-import pycryptodome ^
          --hidden-import Crypto ^
          --hidden-import Crypto.Cipher ^
          --hidden-import Crypto.Util ^
          --hidden-import tkinter ^
          --hidden-import tkinter.ttk ^
          --hidden-import tkinter.scrolledtext ^
          --hidden-import tkinter.filedialog ^
          --hidden-import tkinter.messagebox ^
          --collect-all selenium ^
          --collect-all webdriver_manager ^
          app.py

    - name: Verify build output
      run: |
        if exist "crawler\dist\ml0987下载器\ffmpeg.exe" (
          echo "✓ ffmpeg.exe included"
        ) else (
          echo "✗ ffmpeg.exe NOT found!"
          exit 1
        )

    - name: Package for upload
      run: |
        Compress-Archive -Path crawler\dist\ml0987下载器 -DestinationPath ml0987下载器.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ml0987下载器-windows
        path: ml0987下载器.zip
        retention-days: 30
